services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?.env 파일에 POSTGRES_PASSWORD를 설정하세요}
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # 호스트 5432와 충돌을 피하기 위해 기본 15432로 노출 (컨테이너 내부는 5432)
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: .
    environment:
      ORCH_ENV: ${ORCH_ENV:-local}
      ORCH_LOG_LEVEL: ${ORCH_LOG_LEVEL:-INFO}
      ORCH_LOG_JSON: ${ORCH_LOG_JSON:-true}
      ORCH_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-orchestrator}
      ORCH_SESSION_TTL_HOURS: ${ORCH_SESSION_TTL_HOURS:-168}
      ORCH_SESSION_COOKIE_SECURE: ${ORCH_SESSION_COOKIE_SECURE:-false}
      ORCH_ADMIN_EMAIL: ${ORCH_ADMIN_EMAIL:-}
      ORCH_ADMIN_PASSWORD: ${ORCH_ADMIN_PASSWORD:-}
      ORCH_ADMIN_DISPLAY_NAME: ${ORCH_ADMIN_DISPLAY_NAME:-관리자}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  pgdata:
