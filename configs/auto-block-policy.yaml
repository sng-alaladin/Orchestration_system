# 적합도 분류 게이트 정책 (spec 01 §37, 05 §19.4)
# MVP 자동 차단 항목은 자문과 무관하게 자동 구현하지 않는다.

prohibited:
  payment:
    label: "결제 기능"
    keywords: ["결제", "카드결제", "빌링", "환불 처리", "payment", "billing", "checkout"]
    alternative: "결제 기능을 제외한 범위로 다시 시작할 수 있습니다. 결제가 꼭 필요하면 개발자 자문 후 별도 프로젝트로 진행하세요."
  sensitive_personal_data:
    label: "법적 민감 개인정보 처리"
    keywords: ["주민등록번호", "여권번호", "운전면허번호", "건강정보", "진료기록", "민감정보"]
    alternative: "민감 개인정보를 저장하지 않는 방식(예: 익명화된 데이터만 사용)으로 범위를 줄여 다시 시작할 수 있습니다."
  production_db:
    label: "운영 데이터베이스 직접 연동"
    keywords: ["운영 DB", "운영DB", "운영 데이터베이스", "production db", "production database", "실서버 DB"]
    alternative: "운영 데이터베이스 대신 내보낸 사본 파일(엑셀/CSV)을 사용하는 범위로 다시 시작할 수 있습니다."

expert_review:
  label: "전문가 검토 필요"
  keywords: ["사내 인증 연동", "sso", "인프라 구축", "대규모 트래픽", "개인정보 수집", "회원 정보 저장", "법적"]

risky:
  label: "위험 경계 기능 (축소 범위 제안 대상)"
  keywords: ["실시간 알림", "크롤링", "외부 API 연동", "자동 발송", "스크래핑"]

unsupported:
  label: "현재 시스템 범위 밖"
  keywords: ["모바일 앱스토어 배포", "하드웨어 제어", "임베디드", "블록체인"]
